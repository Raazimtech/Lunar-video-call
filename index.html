<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Call — Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: 'var(--primary)',
              panel: 'var(--panel-bg)',
              border: 'var(--border-color)',
            }
          }
        }
      }
    </script>
    <style>
        :root {
            /* Default Theme: Warm Orange (No Neon) */
            --bg-color: #0b141a;
            --panel-bg: #111b21;
            --primary: #f59e0b;
            --text-color: #e9edef;
            --border-color: rgba(255,255,255,0.08);
            --chat-bubble-in: #202c33;
            --chat-bubble-out: #7c2d12;
        }

        [data-theme="sakura"] {
            --bg-color: #fff0f3;
            --panel-bg: #ffffff;
            --primary: #ffb7c5;
            --text-color: #5d2e46;
            --border-color: rgba(93, 46, 70, 0.1);
            --chat-bubble-in: #ffffff;
            --chat-bubble-out: #ffd1dc;
        }

        [data-theme="midnight"] {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #38bdf8;
            --text-color: #f1f5f9;
            --border-color: rgba(255,255,255,0.1);
            --chat-bubble-in: #334155;
            --chat-bubble-out: #0369a1;
        }

        [data-theme="forest"] {
            --bg-color: #064e3b;
            --panel-bg: #065f46;
            --primary: #10b981;
            --text-color: #ecfdf5;
            --border-color: rgba(255,255,255,0.1);
            --chat-bubble-in: #047857;
            --chat-bubble-out: #064e3b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        
        .loom-wallpaper {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 22px 22px;
        }

        .scrollbar::-webkit-scrollbar { width: 6px; }
        .scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .chat-msg.self { background: var(--chat-bubble-out); align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-msg.other { background: var(--chat-bubble-in); align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .video-wrapper video { width: 100%; border-radius: 12px; aspect-ratio: 16/9; object-fit: cover; background: #000; }
    </style>
</head>
<body class="h-screen flex flex-col items-center p-0 md:p-4 overflow-hidden">

    <!-- Theme Selector Top Right -->
    <div class="absolute top-4 right-4 z-50">
        <select id="themeSelect" class="bg-panel border border-border text-brand text-xs font-bold p-2 rounded-xl outline-none shadow-lg">
            <option value="default">🍊 Warm Orange</option>
            <option value="sakura">🌸 Sakura Blossom</option>
            <option value="midnight">🌙 Midnight Blue</option>
            <option value="forest">🌲 Forest Deep</option>
        </select>
    </div>

    <!-- Authentication Screen -->
    <div id="authScreen" class="w-full max-w-md mt-20 p-6 bg-panel rounded-3xl shadow-2xl border border-border">
        <div class="flex justify-center mb-6">
            <img src="logo.png" class="w-20 h-20 rounded-2xl shadow-lg" onerror="this.src='https://ui-avatars.com/api/?name=Lunar&background=random'">
        </div>
        <h1 class="text-3xl font-bold text-center mb-2">Lunar Call</h1>
        <p class="text-sm opacity-60 text-center mb-8">Secure P2P Video & Chat</p>
        
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full bg-black/20 p-4 rounded-2xl outline-none border border-border focus:border-brand/50 transition">
            <input type="password" id="password" placeholder="Password" class="w-full bg-black/20 p-4 rounded-2xl outline-none border border-border focus:border-brand/50 transition">
            <input type="text" id="pfpUrl" placeholder="Avatar URL (Optional)" class="w-full bg-black/20 p-4 rounded-2xl outline-none border border-border focus:border-brand/50 transition">
            
            <div class="flex gap-3 pt-4">
                <button id="loginBtn" class="flex-1 bg-brand text-black font-bold p-4 rounded-2xl hover:brightness-110 transition">Login</button>
                <button id="registerBtn" class="flex-1 border border-border font-bold p-4 rounded-2xl hover:bg-white/5 transition">Register</button>
            </div>
            <p id="authStatus" class="text-center text-sm font-medium mt-4 h-5"></p>
        </div>
    </div>

    <!-- Main Application UI -->
    <div id="appScreen" class="hidden w-full max-w-6xl h-full flex flex-col md:flex-row gap-4">
        
        <!-- Left Sidebar: Room Controls -->
        <aside class="w-full md:w-80 bg-panel rounded-3xl border border-border p-5 flex flex-col gap-4 shadow-xl">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                    <img id="userPfp" class="w-10 h-10 rounded-full border border-border object-cover">
                    <span id="loggedInUser" class="font-bold text-sm truncate"></span>
                </div>
                <button id="logoutBtn" class="text-xs opacity-50 hover:text-red-400 transition">Logout</button>
            </div>

            <div class="space-y-4">
                <label class="text-[10px] uppercase font-bold tracking-widest opacity-40">Room Settings</label>
                <input type="text" id="callBinId" placeholder="Room ID" class="w-full bg-black/20 p-3 rounded-xl text-sm border border-border outline-none focus:border-brand/50">
                
                <div class="flex flex-col gap-2">
                    <button id="initSystemBtn" class="bg-white/5 border border-border p-3 rounded-xl text-xs font-bold hover:bg-white/10 transition">1. Initialize Hardware</button>
                    <button id="createCallBtn" disabled class="bg-brand text-black p-3 rounded-xl text-xs font-bold disabled:opacity-30">2. Create Room</button>
                    <button id="joinCallBtn" disabled class="bg-white/5 border border-border p-3 rounded-xl text-xs font-bold disabled:opacity-30">2. Join Room</button>
                    <button id="checkAnswerBtn" disabled class="bg-white/5 border border-border p-3 rounded-xl text-xs font-bold disabled:opacity-30">3. Sync Peer</button>
                </div>
                <div id="callStatus" class="text-[11px] p-3 rounded-xl bg-black/20 border border-border text-brand leading-relaxed">System Ready. Click Initialize.</div>
            </div>
        </aside>

        <!-- Main Workspace: Video Top, Chat Bottom -->
        <main class="flex-1 flex flex-col gap-4 min-h-0">
            
            <!-- Video Section (TOP) -->
            <section class="bg-panel rounded-3xl border border-border p-4 shadow-xl">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h3 class="text-xs font-bold uppercase tracking-widest opacity-40"><i class="fa-solid fa-video mr-2"></i>Media Feed</h3>
                    <button id="toggleVideoUIBtn" disabled class="bg-brand/10 text-brand text-[10px] font-bold px-4 py-2 rounded-lg border border-brand/20 hover:bg-brand/20 transition">Enable Camera</button>
                </div>
                
                <div id="videoGrid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="video-wrapper relative group">
                        <span class="absolute top-3 left-3 bg-black/60 px-2 py-1 rounded text-[10px] font-bold z-10">You</span>
                        <video id="localVideo" autoplay playsinline muted></video>
                    </div>
                    <!-- Remote videos append here -->
                </div>
                <div id="videoPlaceholder" class="h-32 flex items-center justify-center border-2 border-dashed border-border rounded-2xl opacity-20">
                    <p class="text-xs italic">Media stream inactive</p>
                </div>
            </section>

            <!-- Chat Section (BOTTOM) -->
            <section class="flex-1 bg-panel rounded-3xl border border-border flex flex-col overflow-hidden shadow-xl loom-wallpaper">
                <div class="p-4 border-b border-border bg-panel/50 backdrop-blur">
                    <h3 class="text-xs font-bold uppercase tracking-widest opacity-40"><i class="fa-solid fa-message mr-2"></i>Secure Chat</h3>
                </div>

                <div id="chatBox" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 scrollbar">
                    <div class="mt-auto text-center py-10 opacity-30 text-xs italic">Messages are encrypted and transmitted via DataChannel</div>
                </div>

                <div class="p-4 bg-panel/50 backdrop-blur flex gap-3">
                    <input type="text" id="chatInput" disabled placeholder="Wait for connection..." class="flex-1 bg-black/20 p-4 rounded-2xl outline-none border border-border focus:border-brand/50 transition">
                    <button id="sendChatBtn" disabled class="w-14 h-14 bg-brand text-black rounded-2xl flex items-center justify-center hover:brightness-110 disabled:opacity-30 transition">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- SECURE CONFIGURATION ---
        const MASTER_API_KEY = "$2a$10$XDKbJJajqyGNm9ZsoEkXueGbfMG7OteKGLwJJ7BtI8mv1/PEJTLta";
        const USERS_BIN_ID = "6a17e111ddf5aa59f76eb87b";

        // DOM UI Mapping
        const authScreen = document.getElementById('authScreen');
        const appScreen = document.getElementById('appScreen');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const pfpUrlInput = document.getElementById('pfpUrl');
        const authStatus = document.getElementById('authStatus');
        const loggedInUserText = document.getElementById('loggedInUser');
        const userPfpImg = document.getElementById('userPfp');
        const initSystemBtn = document.getElementById('initSystemBtn');
        const createCallBtn = document.getElementById('createCallBtn');
        const joinCallBtn = document.getElementById('joinCallBtn');
        const checkAnswerBtn = document.getElementById('checkAnswerBtn');
        const callBinIdInput = document.getElementById('callBinId');
        const callStatus = document.getElementById('callStatus');
        const chatBox = document.getElementById('chatBox');
        const chatInput = document.getElementById('chatInput');
        const sendChatBtn = document.getElementById('sendChatBtn');
        const toggleVideoUIBtn = document.getElementById('toggleVideoUIBtn');
        const videoGrid = document.getElementById('videoGrid');
        const localVideo = document.getElementById('localVideo');
        const videoPlaceholder = document.getElementById('videoPlaceholder');

        let currentUserAvatar = "";
        let currentUser = "";

        // WebRTC Config
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc = new RTCPeerConnection(servers);
        let localStream;
        let dataChannel;
        let isVideoActive = false;

        // --- THEME LOGIC ---
        const themeSelect = document.getElementById('themeSelect');
        
        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('lunarTheme', theme);
            themeSelect.value = theme;
        }

        themeSelect.onchange = (e) => applyTheme(e.target.value);

        // --- AUTH LOGIC ---
        function setStatus(element, msg, color) {
            element.innerText = msg;
            element.style.color = `var(--${color})`;
        }

        function handleLoginSuccess(user, avatar) {
            currentUser = user;
            currentUserAvatar = avatar;
            loggedInUserText.innerText = `@${user}`;
            userPfpImg.src = avatar;
            authScreen.style.display = 'none';
            appScreen.classList.remove('hidden');
            appScreen.classList.add('flex');
            localStorage.setItem('lunarSession', JSON.stringify({ user, avatar }));
        }

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('lunarSession');
            location.reload();
        };

        async function fetchUsers() {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': MASTER_API_KEY }
            });
            if (!response.ok) throw new Error("Database connection failed.");
            return (await response.json()).record.users || [];
        }

        document.getElementById('registerBtn').onclick = async () => {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();
            const pfp = pfpUrlInput.value.trim() || `https://ui-avatars.com/api/?name=${user}`;
            
            if (!user || !pass) return setStatus(authStatus, "Credentials required.", "danger");
            setStatus(authStatus, "Registering...", "primary");
            try {
                let users = await fetchUsers();
                if (users.some(u => u.username.toLowerCase() === user.toLowerCase())) return setStatus(authStatus, "Username taken.", "danger");
                users.push({ username: user, password: pass, avatar: pfp });
                await fetch(`https://api.jsonbin.io/v3/b/${USERS_BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_API_KEY },
                    body: JSON.stringify({ users: users })
                });
                setStatus(authStatus, "Registration successful. Please login.", "success");
            } catch (err) { setStatus(authStatus, err.message, "danger"); }
        };

        document.getElementById('loginBtn').onclick = async () => {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();
            if (!user || !pass) return setStatus(authStatus, "Credentials required.", "danger");
            setStatus(authStatus, "Verifying...", "primary");
            try {
                let users = await fetchUsers();
                const foundUser = users.find(u => u.username === user && u.password === pass);
                if (foundUser) {
                    handleLoginSuccess(foundUser.username, foundUser.avatar);
                } else {
                    setStatus(authStatus, "Invalid credentials.", "danger");
                }
            } catch (err) { setStatus(authStatus, err.message, "danger"); }
        };

        // --- CHAT LOGIC ---
        function appendMessage(sender, text, avatar, isSelf) {
            if(chatBox.innerHTML.includes("history will appear here")) chatBox.innerHTML = ""; // Clear placeholder
            const msgDiv = document.createElement('div');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            msgDiv.className = `chat-msg ${isSelf ? 'self' : 'other'}`;
            msgDiv.innerHTML = `
                <div class="msg-header">
                    <img src="${avatar}" style="width:18px;height:18px;border-radius:50%">
                    <span class="sender">${sender}</span>
                </div>
                <div>${text}</div>
                <div class="timestamp">${time}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setupDataChannel(channel) {
            channel.onopen = () => {
                chatInput.disabled = false;
                sendChatBtn.disabled = false;
                chatInput.placeholder = "Type your message...";
                setStatus(callStatus, "Connected! You can now chat.", "success");
            };
            channel.onmessage = (event) => {
                const data = JSON.parse(event.data);
                appendMessage(data.user, data.text, data.avatar, false);
            };
        }

        sendChatBtn.onclick = () => {
            const text = chatInput.value.trim();
            if (!text || !dataChannel || dataChannel.readyState !== "open") return;
            const msgObj = { user: currentUser, text: text, avatar: currentUserAvatar };
            dataChannel.send(JSON.stringify(msgObj));
            appendMessage(currentUser, text, currentUserAvatar, true);
            chatInput.value = "";
        };

        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatBtn.click(); });

        // --- WEBRTC LOGIC ---

        // Helper: Add small remote video
        function addRemoteVideoStream(stream) {
            if(document.getElementById(`remote-${stream.id}`)) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'video-wrapper relative group';
            wrapper.id = `remote-${stream.id}`;
            const label = document.createElement('span');
            label.className = 'absolute top-3 left-3 bg-black/60 px-2 py-1 rounded text-[10px] font-bold z-10';
            label.innerText = "Partner";
            const remoteVid = document.createElement('video');
            remoteVid.autoplay = true;
            remoteVid.playsInline = true;
            remoteVid.srcObject = stream;
            wrapper.appendChild(label);
            wrapper.appendChild(remoteVid);
            videoGrid.appendChild(wrapper);
        }

        // 1. Init System (Grabs devices secretly to prepare tracks, but mutes them)
        initSystemBtn.onclick = async () => {
            try {
                setStatus(callStatus, "Requesting permissions...", "primary");
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                
                // CRITICAL: Disable media tracks immediately so user is hidden/muted until they click the Video button
                localStream.getTracks().forEach(track => {
                    track.enabled = false; 
                    pc.addTrack(track, localStream);
                });

                pc.ontrack = event => addRemoteVideoStream(event.streams[0]);
                pc.ondatachannel = event => setupDataChannel(event.channel); // Receiver listens for data channel

                setStatus(callStatus, "System Ready. Create or Join a Room.", "success");
                initSystemBtn.disabled = true;
                createCallBtn.disabled = false;
                joinCallBtn.disabled = false;
                toggleVideoUIBtn.disabled = false;
            } catch (error) {
                setStatus(callStatus, "Camera/Mic access denied. Cannot proceed.", "danger");
            }
        };

        // Video UI Toggle
        toggleVideoUIBtn.onclick = () => {
            isVideoActive = !isVideoActive;
            // Enable/Disable actual hardware tracks
            localStream.getTracks().forEach(track => track.enabled = isVideoActive);
            
            if (isVideoActive) {
                videoGrid.classList.remove('hidden');
                videoPlaceholder.classList.add('hidden');
                toggleVideoUIBtn.innerText = "Disable Camera";
                toggleVideoUIBtn.classList.add('text-red-400', 'border-red-400/20', 'bg-red-400/10');
            } else {
                videoGrid.classList.add('hidden');
                videoPlaceholder.classList.remove('hidden');
                toggleVideoUIBtn.innerText = "Enable Camera";
                toggleVideoUIBtn.classList.remove('text-red-400', 'border-red-400/20', 'bg-red-400/10');
            }
        };

        // 2. Create Call (Caller)
        createCallBtn.onclick = async () => {
            // Offerer creates the data channel FIRST
            dataChannel = pc.createDataChannel("chat");
            setupDataChannel(dataChannel);

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            const callData = { offer: { type: offer.type, sdp: offer.sdp } };
            setStatus(callStatus, "Generating Room...", "primary");

            pc.onicegatheringstatechange = async () => {
                if (pc.iceGatheringState === 'complete') {
                    callData.offer.sdp = pc.localDescription.sdp;
                    try {
                        const response = await fetch('https://api.jsonbin.io/v3/b', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_API_KEY },
                            body: JSON.stringify(callData)
                        });
                        const data = await response.json();
                        callBinIdInput.value = data.metadata.id;
                        setStatus(callStatus, `Room Created! ID: ${data.metadata.id}. Waiting for peer to join...`, "success");
                        checkAnswerBtn.disabled = false;
                        createCallBtn.disabled = true;
                        joinCallBtn.disabled = true;
                    } catch (err) { setStatus(callStatus, "Network error.", "danger"); }
                }
            };
        };

        // 3. Join Call (Receiver)
        joinCallBtn.onclick = async () => {
            const sessionBinId = callBinIdInput.value.trim();
            if (!sessionBinId) return alert("Enter Room ID.");
            setStatus(callStatus, "Joining Room...", "primary");

            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${sessionBinId}`, { headers: { 'X-Master-Key': MASTER_API_KEY } });
                let data = await res.json();
                
                await pc.setRemoteDescription(new RTCSessionDescription(data.record.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                const updatedData = { ...data.record, answer: { type: answer.type, sdp: answer.sdp } };

                pc.onicegatheringstatechange = async () => {
                    if (pc.iceGatheringState === 'complete') {
                        updatedData.answer.sdp = pc.localDescription.sdp;
                        await fetch(`https://api.jsonbin.io/v3/b/${sessionBinId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_API_KEY },
                            body: JSON.stringify(updatedData)
                        });
                        setStatus(callStatus, "Room Joined! Connecting...", "success");
                        createCallBtn.disabled = true;
                        joinCallBtn.disabled = true;
                    }
                };
            } catch (err) { setStatus(callStatus, "Error joining room.", "danger"); }
        };

        // 4. Sync (Caller checks for answer)
        checkAnswerBtn.onclick = async () => {
            const sessionBinId = callBinIdInput.value;
            setStatus(callStatus, "Syncing...", "primary");
            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${sessionBinId}`, { headers: { 'X-Master-Key': MASTER_API_KEY } });
                let data = await res.json();
                if (!data.record.answer) return setStatus(callStatus, "No peers yet. Click sync again shortly.", "danger");
                await pc.setRemoteDescription(new RTCSessionDescription(data.record.answer));
                setStatus(callStatus, "Connection established!", "success");
                checkAnswerBtn.disabled = true;
            } catch (err) { setStatus(callStatus, "Sync failed.", "danger"); }
        };

        // --- ON PAGE LOAD ---
        window.onload = () => {
            // Restore Theme
            const savedTheme = localStorage.getItem('lunarTheme') || 'default';
            applyTheme(savedTheme);

            // Restore Session
            const savedSession = JSON.parse(localStorage.getItem('lunarSession'));
            if (savedSession) handleLoginSuccess(savedSession.user, savedSession.avatar);
        };
    </script>
</body>
</html>
